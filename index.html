function buildSP(cfg) {
  const {vertical,fields,autonomy,payments,kb} = cfg;
  const v = VERTICALS.find(x=>x.id===vertical);
  const ep = payments.filter(p=>p.enabled);
  let pay = ep.length>0
    ? "\nPAGAMENTO: "+ep.map(p=>{const m=PAY_METHODS.find(x=>x.id===p.id);return p.id==="credit_card"?m?.label+" (até "+autonomy.installments+"x)":p.id==="boleto"?m?.label+" (CPF)":m?.label}).join(", ")+". Só esses."
    : "\nPAGAMENTO: NÃO processa. Passe pro responsável.";

  let s = `Você é o clone digital de "${fields.business_name||"o negócio"}". WhatsApp. HUMANO, BRASILEIRO.

IDENTIDADE:
  Negócio: ${fields.description||"Não informado"}
  Categoria: ${v?.label||"Geral"}
  Tom: ${fields.tone||"Profissional e amigável"}
  Horário: ${fields.hours||"Não definido"}

COMPORTAMENTO:
  - Mensagens CURTAS (1-2 frases). Separadas. Brasileiro real.
  - Rapport antes de vender.
  - Espelhe o tom do lead.
  - Personalidade: ${autonomy.personality||"Acolhedor"}
  ${autonomy.emojis==="Sim"?"- Emojis com moderação.":"- NUNCA use emojis."}
  ${autonomy.discount!=="0%"?"- Desconto máximo: "+autonomy.discount+". Só se pedir.":"- Sem desconto."}
${pay}

FUNIL: RAPPORT → DISCOVERY → OFFER → CLOSING

REGRAS:
  1. NUNCA invente preços, produtos, prazos
  2. Sem markdown, sem asteriscos
  3. Dúvida: "Vou confirmar e já te retorno!"
  4. FOCO NO NEGÓCIO
  5. Só fatos da BASE DE CONHECIMENTO`;
  if(kb?.trim()) s+="\n\nBASE DE CONHECIMENTO:\n"+kb;
  return s;
}

function buildKB(vertical,fields) {
  const p=[];
  const l=[];
  if(fields.instagram?.trim())l.push("Instagram: "+fields.instagram);
  if(fields.google_business?.trim())l.push("Google: "+fields.google_business);
  if(fields.website?.trim())l.push("Site: "+fields.website);
  if(l.length)p.push(l.join("\n"));
  (VF[vertical]||[]).forEach(f=>{if(fields[f.id]?.trim())p.push(f.label+": "+fields[f.id])});
  if(fields.faq?.trim())p.push("FAQ:\n"+fields.faq);
  if(fields.custom_rules?.trim())p.push("Regras:\n"+fields.custom_rules);
  return p.join("\n\n");
}

  return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,fontSize:12,color:t.muted}},

    ),
    React.createElement("span",{style:{color:c,fontWeight:600,fontFamily:"monospace"}},"~"+tk+"/3000")
  );
}

      onFocus:e=>{e.target.style.borderColor="#3B82F6"},
      onBlur:e=>{e.target.style.borderColor=t.border},

}
